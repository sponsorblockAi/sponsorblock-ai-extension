<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SponsorBlock AI</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>🎯 <span data-i18n="extName">SponsorBlock AI</span></h1>
        <p class="subtitle" data-i18n="extSubtitle">LLM-powered sponsor detection</p>
      </div>

      <form id="settings-form">
        <div class="field">
          <label for="base-url" data-i18n="labelApiBaseUrl">API Base URL</label>
          <input
            type="url"
            id="base-url"
            data-i18n-placeholder="placeholderApiBaseUrl"
            placeholder="https://api.openai.com/v1"
            autocomplete="off"
          />
          <span class="hint" data-i18n="hintApiBaseUrl">OpenAI-compatible endpoint</span>
        </div>

        <div class="field">
          <label for="api-key" data-i18n="labelApiKey">API Key</label>
          <input
            type="password"
            id="api-key"
            data-i18n-placeholder="placeholderApiKey"
            placeholder="sk-..."
            autocomplete="off"
          />
        </div>

        <div class="field">
          <label for="model" data-i18n="labelModel">Model Name</label>
          <input
            type="text"
            id="model"
            data-i18n-placeholder="placeholderModel"
            placeholder="gpt-4o-mini"
            autocomplete="off"
          />
          <span class="hint" data-i18n="hintModel">Any OpenAI-compatible model</span>
        </div>

        <button type="submit" id="save-btn" data-i18n="btnSaveSettings">Save Settings</button>
      </form>

      <div class="divider"></div>

      <button id="rescan-btn" data-i18n="btnRescan">🔁 Re-scan This Video</button>
      <p class="hint rescan-hint" data-i18n="hintRescan">
        Force re-detection even if segments already exist
      </p>

      <div id="status" class="status hidden"></div>

      <div class="footer">
        <p data-i18n="footerText">Detected segments are automatically submitted to SponsorBlock.</p>
      </div>

      <div class="divider"></div>

      <div class="error-log-section">
        <button id="toggle-error-log" class="error-log-toggle">
          <span data-i18n="labelErrorLog">⚠ Diagnostic Log</span>
          <span id="error-count" class="error-count">0</span>
        </button>
        <div id="error-log-content" class="error-log-content hidden">
          <div id="error-log-list" class="error-log-list"></div>
          <div class="error-log-actions">
            <button id="copy-error-log" class="btn-small" data-i18n="btnCopyErrorLog">
              Copy to Clipboard
            </button>
            <button id="clear-error-log" class="btn-small btn-danger" data-i18n="btnClearErrorLog">
              Clear
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
