version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    versioning-strategy: "increase"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10
    groups:
      typescript-eslint:
        patterns:
          - "typescript"
          - "typescript-eslint"
          - "@types/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "happy-dom"
          - "@playwright/test"
      linting:
        patterns:
          - "eslint"
          - "eslint-config-prettier"
          - "prettier"
          - "lint-staged"
          - "husky"
      build:
        patterns:
          - "vite"
          - "vite-plugin-static-copy"
          - "cross-env"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
